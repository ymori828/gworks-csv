<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G.works 定期オファーCSV生成</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f1f5f9; color: #1e293b; font-size: 14px; }

  header {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-icon { background: #f97316; border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .header-title { color: #fff; font-weight: 800; font-size: 17px; }
  .header-sub { color: #475569; font-size: 11px; margin-top: 2px; }
  #badge-count { background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.3); border-radius: 8px; padding: 7px 14px; color: #fb923c; font-size: 13px; font-weight: 700; display: none; }
  #btn-download { padding: 10px 24px; background: linear-gradient(135deg, #f97316, #ea580c); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; font-family: inherit; box-shadow: 0 4px 12px rgba(249,115,22,0.4); transition: opacity 0.15s; }
  #btn-download:hover { opacity: 0.88; }

  .main { max-width: 1100px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 300px; gap: 16px; }

  .card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 14px; }
  .card-header { padding: 11px 16px; display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 13px; border-bottom: 2px solid; }
  .card-header.orange { background: linear-gradient(135deg, #fff7ed, #fffbf5); border-color: #fed7aa; color: #ea580c; }
  .card-header.purple { background: linear-gradient(135deg, #eef2ff, #f5f3ff); border-color: #c7d2fe; color: #4f46e5; }
  .card-header.green  { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-color: #bbf7d0; color: #16a34a; }
  .card-body { padding: 14px 16px; }

  .field label { font-size: 11px; font-weight: 700; color: #64748b; display: block; margin-bottom: 4px; }
  input[type=text], input[type=number], input[type=time], select {
    width: 100%; padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 7px;
    font-size: 13px; font-family: inherit; background: #fff; color: #1e293b; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

  /* ── 便カード ── */
  .offer-card {
    background: #fff; border-radius: 12px; border: 1px solid #e2e8f0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; overflow: hidden;
  }
  .offer-header {
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #0f172a, #1e3a5f);
    cursor: pointer; user-select: none;
  }
  .offer-header:hover { background: linear-gradient(135deg, #1e293b, #1e40af); }
  .offer-num-badge {
    background: #f97316; color: #fff; font-weight: 800; font-size: 12px;
    padding: 3px 10px; border-radius: 6px; letter-spacing: 0.5px; flex-shrink: 0;
  }
  .offer-summary { font-size: 11px; color: #94a3b8; margin-left: 4px; }
  .offer-toggle { color: #94a3b8; font-size: 18px; margin-left: auto; transition: transform 0.2s; flex-shrink: 0; }
  .offer-toggle.open { transform: rotate(180deg); }
  .btn-del-offer {
    padding: 4px 10px; background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25);
    border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; font-family: inherit;
    flex-shrink: 0; transition: background 0.12s;
  }
  .btn-del-offer:hover { background: rgba(239,68,68,0.3); }
  .offer-body { padding: 14px 16px; display: none; }
  .offer-body.open { display: block; }

  /* 備考 */
  .memo-field { margin-bottom: 14px; }
  .memo-field label { font-size: 11px; font-weight: 700; color: #64748b; display: block; margin-bottom: 4px; }

  /* ストップカード */
  .stop-card { border-radius: 8px; padding: 12px 14px; border-left: 4px solid; margin-bottom: 2px; }
  .stop-card.pickup   { background: #fff8f0; border-color: #f97316; }
  .stop-card.delivery { background: #eff6ff; border-color: #3b82f6; }
  .stop-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .stop-badge { padding: 3px 10px; border-radius: 5px; color: #fff; font-weight: 800; font-size: 12px; font-family: monospace; letter-spacing: 1px; }
  .stop-badge.p { background: #f97316; }
  .stop-badge.d { background: #3b82f6; }
  .stop-index { font-size: 12px; color: #64748b; font-weight: 600; }
  .btn-remove-stop { margin-left: auto; padding: 3px 10px; background: #fee2e2; color: #ef4444; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; }
  .stop-row1 { display: grid; grid-template-columns: 1fr 120px; gap: 10px; margin-bottom: 10px; }
  .stop-row2 { display: grid; grid-template-columns: 1fr 1fr 90px 90px 120px; gap: 10px; align-items: end; }
  .stop-row3 { margin-top: 10px; }
  .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: #64748b; font-weight: 600; }
  .checkbox-label input[type=checkbox] { accent-color: #f97316; width: 16px; height: 16px; }

  /* 挿入ボタン行 */
  .insert-row { display: flex; align-items: center; padding: 5px 0; position: relative; }
  .insert-row::before { content: ''; position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: #e2e8f0; }
  .insert-btns { display: flex; gap: 6px; background: #f1f5f9; padding: 2px 10px; border-radius: 20px; position: relative; z-index: 1; margin: 0 auto; }
  .btn-ins { padding: 4px 14px; border-radius: 20px; cursor: pointer; font-weight: 700; font-size: 11px; font-family: inherit; border: 1.5px solid; transition: opacity 0.12s; }
  .btn-ins:hover { opacity: 0.72; }
  .btn-ins-p { color: #f97316; border-color: #f97316; background: #fff7ed; }
  .btn-ins-d { color: #3b82f6; border-color: #3b82f6; background: #eff6ff; }

  /* ＋ オファー追加ボタン */
  .btn-add-offer {
    width: 100%; padding: 13px; background: transparent;
    border: 2px dashed #cbd5e1; border-radius: 12px; cursor: pointer;
    color: #64748b; font-size: 14px; font-weight: 700; font-family: inherit;
    transition: all 0.15s; margin-bottom: 14px;
  }
  .btn-add-offer:hover { border-color: #f97316; color: #f97316; background: #fff7ed; }

  /* カレンダー */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-nav-btn { background: #f1f5f9; border: none; border-radius: 8px; width: 30px; height: 30px; cursor: pointer; font-size: 18px; color: #64748b; }
  .cal-month-label { font-weight: 800; font-size: 15px; color: #1e293b; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 4px; }
  .cal-wd { text-align: center; font-size: 11px; font-weight: 700; padding: 3px 0; }
  .cal-wd.sun { color: #ef4444; } .cal-wd.sat { color: #3b82f6; } .cal-wd.wkd { color: #64748b; }
  .cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .cal-day { padding: 7px 2px; border: 2px solid transparent; border-radius: 7px; background: #fff; cursor: pointer; font-size: 13px; font-family: inherit; text-align: center; transition: all 0.1s; }
  .cal-day:hover { border-color: #fdba74; }
  .cal-day.selected { background: #f97316 !important; color: #fff !important; font-weight: 800; border-color: #f97316 !important; }
  .cal-day.today { border-color: #94a3b8; }
  .cal-day.sun { color: #ef4444; } .cal-day.sat { color: #3b82f6; }
  .cal-day.empty { background: transparent; cursor: default; border: none; }
  .cal-day.past { background: #f8fafc; color: #cbd5e1 !important; cursor: not-allowed; border-color: transparent !important; }
  .cal-quick { display: flex; gap: 6px; margin-top: 10px; }
  .btn-quick { flex: 1; padding: 6px; font-size: 11px; font-weight: 600; background: transparent; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; color: #64748b; font-family: inherit; }
  .btn-quick-clear { border-color: #fecaca; color: #ef4444; }

  .date-list { max-height: 200px; overflow-y: auto; }
  .date-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 14px; font-size: 12px; border-bottom: 1px solid #f8fafc; }
  .btn-remove-date { border: none; background: transparent; cursor: pointer; color: #ef4444; font-size: 15px; padding: 0 4px; }
  .date-list-header { padding: 9px 14px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
  .btn-clear-all { padding: 3px 10px; background: transparent; border: 1px solid #fecaca; border-radius: 5px; cursor: pointer; color: #ef4444; font-size: 11px; font-weight: 600; font-family: inherit; }

  /* CSV件数バッジ */
  #csv-preview { font-size: 11px; color: #64748b; padding: 0 4px; }

  /* ── カスタムモーダル ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.15s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal-box {
    background: #fff; border-radius: 16px; padding: 28px 28px 20px;
    max-width: 380px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    transform: scale(0.92); transition: transform 0.15s;
  }
  .modal-overlay.active .modal-box { transform: scale(1); }
  .modal-icon { font-size: 32px; margin-bottom: 10px; text-align: center; }
  .modal-title { font-weight: 800; font-size: 16px; color: #1e293b; text-align: center; margin-bottom: 8px; }
  .modal-msg { font-size: 13px; color: #64748b; text-align: center; line-height: 1.6; margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 14px; font-family: inherit; transition: opacity 0.12s; }
  .modal-btn:hover { opacity: 0.82; }
  .modal-btn-cancel { background: #f1f5f9; color: #64748b; }
  .modal-btn-ok { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; }
  .modal-btn-ok.blue { background: linear-gradient(135deg, #6366f1, #4f46e5); }
  .modal-btn-ok.orange { background: linear-gradient(135deg, #f97316, #ea580c); }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .stop-row2 { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-icon">🔄</div>
    <div>
      <div class="header-title">G.works 定期オファーCSV生成</div>
      <div class="header-sub">テンプレートを作成 → 日付を選択 → CSVダウンロード</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <div id="badge-count">📅 <span id="count-num">0</span>日選択中</div>
    <span id="csv-preview"></span>
    <button id="btn-download" onclick="downloadCSV()">⬇ CSVダウンロード</button>
  </div>
</header>

<div class="main">
  <div>
    <div id="offers-container"></div>
    <button class="btn-add-offer" onclick="addOffer()">＋ オファーを追加</button>
  </div>

  <div>
    <div class="card">
      <div class="card-header green">📅 実施日を選択（複数可）</div>
      <div class="card-body" id="calendar-root"></div>
    </div>
    <div class="card" id="date-list-card" style="display:none">
      <div class="date-list-header">
        <span style="font-weight:700;font-size:13px;color:#1e293b">選択中 (<span id="selected-count">0</span>件)</span>
        <button class="btn-clear-all" onclick="clearAllDates()">全クリア</button>
      </div>
      <div class="date-list" id="date-list"></div>
    </div>
  </div>
</div>

<!-- カスタムモーダル -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon">⚠️</div>
    <div class="modal-title" id="modal-title">確認</div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" id="modal-cancel">キャンセル</button>
      <button class="modal-btn modal-btn-ok" id="modal-ok">削除する</button>
    </div>
  </div>
</div>

<script>
const WEEKDAYS = ['日','月','火','水','木','金','土'];
const 荷役_P   = ['無し','手積み','フォークリフト'];
const 荷役_D   = ['無し','手卸し','フォークリフト'];
const 荷姿LIST  = ['パレット','バラ','その他'];

let offers = [];
let selectedDates = [];
let offerIdCounter = 0;
let stopIdCounter = 0;
let calYear, calMonth;

function pad2(n) { return String(n).padStart(2,'0'); }
function dateKey(y,m,d) { return `${y}-${pad2(m)}-${pad2(d)}`; }
function daysInMonth(y,m) { return new Date(y,m,0).getDate(); }
function firstDow(y,m) { return new Date(y,m-1,1).getDay(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── モーダル ─────────────────────────────────────────
function showModal({ icon='⚠️', title='確認', msg, okLabel='削除する', okClass='', onOk, onCancel }) {
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  const btnOk = document.getElementById('modal-ok');
  const btnCa = document.getElementById('modal-cancel');
  btnOk.textContent = okLabel;
  btnOk.className = 'modal-btn modal-btn-ok' + (okClass ? ' ' + okClass : '');
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('active');
  const close = () => overlay.classList.remove('active');
  btnOk.onclick = () => { close(); onOk && onOk(); };
  btnCa.onclick = () => { close(); onCancel && onCancel(); };
}

function showAlert({ icon='ℹ️', title='お知らせ', msg, okLabel='OK', okClass='orange' }) {
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  const btnOk = document.getElementById('modal-ok');
  const btnCa = document.getElementById('modal-cancel');
  btnOk.textContent = okLabel;
  btnOk.className = 'modal-btn modal-btn-ok' + (okClass ? ' ' + okClass : '');
  btnCa.style.display = 'none';
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('active');
  btnOk.onclick = () => { overlay.classList.remove('active'); btnCa.style.display = ''; };
  btnCa.onclick = () => { overlay.classList.remove('active'); btnCa.style.display = ''; };
}

// ── オファー ─────────────────────────────────────────
function makeStop(type) {
  return { id: ++stopIdCounter, type, name:'', time: type==='P' ? '09:00' : '14:00',
           kareki:'無し', kadogu:'パレット', hikitori:false, weight:'', vol:'', code:'' };
}

function addOffer() {
  const id = ++offerIdCounter;
  const num = offers.length + 1;
  offers.push({ id, memo: '', collapsed: false, stops: [makeStop('P'), makeStop('D')] });
  renderOffers();
  saveToStorage();
}

function removeOffer(id) {
  if (offers.length <= 1) {
    showAlert({ icon:'⚠️', title:'削除できません', msg:'オファーは最低1件必要です。' });
    return;
  }
  const o = offers.find(o => o.id === id);
  showModal({
    icon: '🗑️', title: 'オファーを削除', msg: `このオファーを削除します。よろしいですか？`,
    okLabel: '削除する',
    onOk: () => {
      offers = offers.filter(o => o.id !== id);
      renderOffers(); saveToStorage();
    }
  });
}

function toggleOffer(id) {
  const o = offers.find(o => o.id === id);
  if (o) { o.collapsed = !o.collapsed; renderOffers(); }
}


function updateOfferMemo(id, val) {
  const o = offers.find(o => o.id === id);
  if (o) { o.memo = val; saveToStorage(); }
}


// ── ストップ ─────────────────────────────────────────
function addStop(offerId, type, afterIndex) {
  const o = offers.find(o => o.id === offerId);
  if (!o) return;
  const s = makeStop(type);
  if (afterIndex === undefined || afterIndex >= o.stops.length) o.stops.push(s);
  else o.stops.splice(afterIndex + 1, 0, s);
  renderOffers(); saveToStorage();
}

function removeStop(offerId, stopId) {
  const o = offers.find(o => o.id === offerId);
  if (!o) return;
  if (o.stops.length <= 2) {
    showAlert({ icon:'⚠️', title:'削除できません', msg:'最低2件（集荷1・配送1）必要です。' });
    return;
  }
  showModal({
    icon: '🗑️', title: 'ストップを削除',
    msg: 'このストップを削除します。よろしいですか？',
    okLabel: '削除する',
    onOk: () => {
      o.stops = o.stops.filter(s => s.id !== stopId);
      renderOffers(); saveToStorage();
    }
  });
}

function updateStop(offerId, stopId, field, value) {
  const o = offers.find(o => o.id === offerId);
  if (!o) return;
  const s = o.stops.find(s => s.id === stopId);
  if (s) { s[field] = value; saveToStorage(); }
}

// ── レンダリング ───────────────────────────────────────
function renderOffers() {
  const container = document.getElementById('offers-container');
  container.innerHTML = '';
  offers.forEach((offer, oidx) => {
    const card = document.createElement('div');
    card.className = 'offer-card';
    const ps = offer.stops.filter(s=>s.type==='P').length;
    const ds = offer.stops.filter(s=>s.type==='D').length;
    const summary = `集荷${ps}・配送${ds}`;

    card.innerHTML = `
      <div class="offer-header" onclick="toggleOffer(${offer.id})">
        <span class="offer-num-badge">オファー ${oidx+1}</span>
        <span class="offer-summary" id="offer-summary-${offer.id}">${summary}</span>
        ${offers.length > 1 ? `<button class="btn-del-offer" onclick="event.stopPropagation(); removeOffer(${offer.id})">削除</button>` : ''}
        <span class="offer-toggle ${offer.collapsed ? '' : 'open'}">▾</span>
      </div>
      <div class="offer-body ${offer.collapsed ? '' : 'open'}" id="offer-body-${offer.id}">
        <div class="memo-field">
          <label>📝 備考</label>
          <input type="text" value="${esc(offer.memo)}"
            placeholder="配送時の注意事項、軒先情報、必要器具など"
            oninput="updateOfferMemo(${offer.id}, this.value)">
        </div>
        <div id="stops-${offer.id}"></div>
      </div>
    `;
    container.appendChild(card);
    renderStops(offer);
  });
  updateCsvPreview();
}

function renderStops(offer) {
  const container = document.getElementById(`stops-${offer.id}`);
  if (!container) return;
  container.innerHTML = '';
  offer.stops.forEach((s, idx) => {
    const isP = s.type === 'P';
    const 荷役opts = isP ? 荷役_P : 荷役_D;
    const card = document.createElement('div');
    card.className = `stop-card ${isP ? 'pickup' : 'delivery'}`;
    card.innerHTML = `
      <div class="stop-header">
        <span class="stop-badge ${isP?'p':'d'}">${isP ? '集荷 P' : '配送 D'}</span>
        <span class="stop-index">${idx+1}ヶ所目</span>
        <button class="btn-remove-stop" onclick="removeStop(${offer.id},${s.id})">削除</button>
      </div>
      <div class="stop-row1">
        <div class="field">
          <label>営業所名・会社名</label>
          <input type="text" placeholder="例：しみず物流株式会社" value="${esc(s.name)}"
            oninput="updateStop(${offer.id},${s.id},'name',this.value)">
        </div>
        <div class="field">
          <label>時刻</label>
          <input type="time" value="${s.time}" oninput="updateStop(${offer.id},${s.id},'time',this.value)">
        </div>
      </div>
      <div class="stop-row2">
        <div class="field">
          <label>荷役</label>
          <select onchange="updateStop(${offer.id},${s.id},'kareki',this.value)">
            ${荷役opts.map(o=>`<option${s.kareki===o?' selected':''}>${esc(o)}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>荷姿</label>
          <select onchange="updateStop(${offer.id},${s.id},'kadogu',this.value)">
            ${荷姿LIST.map(o=>`<option${s.kadogu===o?' selected':''}>${esc(o)}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>総重量 (kg)</label>
          <input type="number" placeholder="0" value="${esc(s.weight)}" style="text-align:right"
            oninput="updateStop(${offer.id},${s.id},'weight',this.value)">
        </div>
        <div class="field">
          <label>総立米 (m³)</label>
          <input type="number" placeholder="0" value="${esc(s.vol)}" style="text-align:right"
            oninput="updateStop(${offer.id},${s.id},'vol',this.value)">
        </div>
        <div class="field">
          <label>品番・コード</label>
          <input type="text" placeholder="0001" value="${esc(s.code)}"
            oninput="updateStop(${offer.id},${s.id},'code',this.value)">
        </div>
      </div>
      <div class="stop-row3">
        <label class="checkbox-label">
          <input type="checkbox" ${s.hikitori?'checked':''} onchange="updateStop(${offer.id},${s.id},'hikitori',this.checked)">
          引取あり（集荷先へ持ち帰りがある場合）
        </label>
      </div>
    `;
    container.appendChild(card);

    const row = document.createElement('div');
    row.className = 'insert-row';
    row.innerHTML = `
      <div class="insert-btns">
        <button class="btn-ins btn-ins-p" onclick="addStop(${offer.id},'P',${idx})">＋ 集荷先を追加</button>
        <button class="btn-ins btn-ins-d" onclick="addStop(${offer.id},'D',${idx})">＋ 配送先を追加</button>
      </div>
    `;
    container.appendChild(row);
  });
}

function updateCsvPreview() {
  const el = document.getElementById('csv-preview');
  if (!el) return;
  const total = selectedDates.length * offers.length;
  el.textContent = total > 0 ? `${total}件生成予定` : '';
}

// ── カレンダー ──────────────────────────────────────
function initCalendar() {
  const t = new Date();
  calYear = t.getFullYear(); calMonth = t.getMonth() + 1;
  renderCalendar();
}

function renderCalendar() {
  const root = document.getElementById('calendar-root');
  const days = daysInMonth(calYear, calMonth);
  const first = firstDow(calYear, calMonth);
  const t = new Date();
  const todayKey = dateKey(t.getFullYear(), t.getMonth()+1, t.getDate());

  let html = `
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="moveMonth(-1)">‹</button>
      <span class="cal-month-label">${calYear}年 ${calMonth}月</span>
      <button class="cal-nav-btn" onclick="moveMonth(1)">›</button>
    </div>
    <div class="cal-weekdays">
      ${WEEKDAYS.map((w,i)=>`<div class="cal-wd ${i===0?'sun':i===6?'sat':'wkd'}">${w}</div>`).join('')}
    </div>
    <div class="cal-days">
  `;
  for (let i=0; i<first; i++) html += `<div class="cal-day empty"></div>`;
  for (let d=1; d<=days; d++) {
    const key = dateKey(calYear, calMonth, d);
    const dow = (first + d - 1) % 7;
    const isPast = key < todayKey;
    let cls = 'cal-day';
    if (isPast) {
      cls += ' past';
      html += `<button class="${cls}" disabled>${d}</button>`;
    } else {
      if (selectedDates.includes(key)) cls += ' selected';
      if (dow === 0) cls += ' sun';
      if (dow === 6) cls += ' sat';
      html += `<button class="${cls}" onclick="toggleDate('${key}')">${d}</button>`;
    }
  }
  html += `</div>
    <div class="cal-quick">
      <button class="btn-quick" onclick="selectWeekdays()">平日すべて選択</button>
      <button class="btn-quick btn-quick-clear" onclick="clearMonth()">この月をクリア</button>
    </div>`;
  root.innerHTML = html;
}

function moveMonth(delta) {
  calMonth += delta;
  if (calMonth > 12) { calMonth=1; calYear++; }
  if (calMonth < 1)  { calMonth=12; calYear--; }
  renderCalendar();
}

function toggleDate(key) {
  const idx = selectedDates.indexOf(key);
  if (idx >= 0) selectedDates.splice(idx, 1); else selectedDates.push(key);
  selectedDates.sort();
  renderCalendar(); renderDateList(); updateBadge(); updateCsvPreview();
}

function selectWeekdays() {
  const t = new Date();
  const todayKey = dateKey(t.getFullYear(), t.getMonth()+1, t.getDate());
  const days = daysInMonth(calYear, calMonth);
  const first = firstDow(calYear, calMonth);
  for (let d=1; d<=days; d++) {
    const dow = (first+d-1)%7;
    const k = dateKey(calYear,calMonth,d);
    if (dow!==0 && dow!==6 && k >= todayKey && !selectedDates.includes(k)) selectedDates.push(k);
  }
  selectedDates.sort(); renderCalendar(); renderDateList(); updateBadge(); updateCsvPreview();
}

function clearMonth() {
  const days = daysInMonth(calYear, calMonth);
  for (let d=1; d<=days; d++) selectedDates = selectedDates.filter(k => k !== dateKey(calYear,calMonth,d));
  renderCalendar(); renderDateList(); updateBadge(); updateCsvPreview();
}

function clearAllDates() { selectedDates=[]; renderCalendar(); renderDateList(); updateBadge(); updateCsvPreview(); }

function renderDateList() {
  const card = document.getElementById('date-list-card');
  document.getElementById('selected-count').textContent = selectedDates.length;
  if (!selectedDates.length) { card.style.display='none'; return; }
  card.style.display = 'block';
  document.getElementById('date-list').innerHTML = selectedDates.map(d => {
    const [y,m,day] = d.split('-');
    const dow = new Date(+y,+m-1,+day).getDay();
    const col = dow===0?'#ef4444':dow===6?'#3b82f6':'#374151';
    return `<div class="date-item">
      <span style="color:${col}">${y}/${pad2(+m)}/${pad2(+day)} (${WEEKDAYS[dow]})</span>
      <button class="btn-remove-date" onclick="toggleDate('${d}')">×</button>
    </div>`;
  }).join('');
}

function updateBadge() {
  document.getElementById('count-num').textContent = selectedDates.length;
  document.getElementById('badge-count').style.display = selectedDates.length ? 'block' : 'none';
}

// ── CSV ─────────────────────────────────────────────
function buildDT(dateStr, timeStr) {
  if (!dateStr || !timeStr) return '';
  const [y,mo,d] = dateStr.split('-'); const [h,mi] = timeStr.split(':');
  return `${y}/${parseInt(mo)}/${parseInt(d)} ${pad2(parseInt(h))}:${mi}`;
}

function csvCell(v) {
  const s = String(v??'');
  return (s.includes(',')||s.includes('"')||s.includes('\n')) ? `"${s.replace(/"/g,'""')}"` : s;
}

function downloadCSV() {
  if (!selectedDates.length) {
    showAlert({ icon:'📅', title:'日付未選択', msg:'日付を1日以上選択してください。' });
    return;
  }
  const rows = [['No','備考','集荷/配送','集荷配送先営業所名','集荷配送日時','荷役','荷姿','引取','総重量','総立米','品番・コード']];

  let no = 0;
  selectedDates.forEach(dateStr => {
    offers.forEach(offer => {
      no++;
      offer.stops.forEach((s, si) => {
        rows.push([
          si === 0 ? no : '',
          si === 0 ? offer.memo : '',
          s.type, s.name,
          buildDT(dateStr, s.time),
          s.kareki, s.kadogu,
          s.hikitori ? '有り' : '',
          s.weight, s.vol, s.code,
        ]);
      });
    });
  });

  const csv = '\uFEFF' + rows.map(r=>r.map(csvCell).join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `gworks_offer_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ── localStorage ──────────────────────────────────────
function saveToStorage() {
  const data = {
    version: 2,
    offers: offers.map(o => ({
      id: o.id, memo: o.memo, collapsed: o.collapsed,
      stops: o.stops.map(s => ({
        type: s.type, name: s.name, time: s.time,
        kareki: s.kareki, kadogu: s.kadogu, hikitori: s.hikitori,
        weight: s.weight, vol: s.vol, code: s.code,
      }))
    }))
  };
  localStorage.setItem('gworks_offers_v2', JSON.stringify(data));
}

function loadFromStorage() {
  try {
    // v2形式を試みる
    const raw2 = localStorage.getItem('gworks_offers_v2');
    if (raw2) {
      const data = JSON.parse(raw2);
      if (data.offers && data.offers.length > 0) {
        offers = [];
        data.offers.forEach(o => {
          const stops = (o.stops || []).map(s => ({
            id: ++stopIdCounter, type: s.type, name: s.name, time: s.time,
            kareki: s.kareki, kadogu: s.kadogu, hikitori: s.hikitori,
            weight: s.weight, vol: s.vol, code: s.code,
          }));
          offers.push({ id: ++offerIdCounter, memo: o.memo||'', collapsed: o.collapsed||false, stops });
        });
        return true;
      }
    }
    // v1形式（旧バージョン互換）
    const raw1 = localStorage.getItem('gworks_offer_template');
    if (raw1) {
      const data = JSON.parse(raw1);
      if (data.stops && data.stops.length >= 2) {
        const stops = data.stops.map(s => ({
          id: ++stopIdCounter, type: s.type, name: s.name, time: s.time,
          kareki: s.kareki, kadogu: s.kadogu, hikitori: s.hikitori,
          weight: s.weight, vol: s.vol, code: s.code,
        }));
        offers = [{ id: ++offerIdCounter, name: '便1', memo: data.memo||'', collapsed: false, stops }];
        return true;
      }
    }
  } catch(e) {}
  return false;
}

// ── 初期化 ──────────────────────────────────────────
const loaded = loadFromStorage();
if (!loaded) { addOffer(); }
else renderOffers();
initCalendar();
</script>
